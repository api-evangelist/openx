aid: openx
name: OpenX
description: >-
  OpenX is an independent supply-side platform (SSP) and programmatic ad
  exchange headquartered in Pasadena, California, founded in 2008. OpenX
  connects publishers and app developers to advertiser demand through a
  real-time marketplace that runs OpenRTB-based auctions across display,
  video, CTV, native, and mobile inventory. Its product suite is organized
  around the OpenX Exchange (the core marketplace), OpenXSelect (curation,
  deal creation, and supply-path targeting), OpenXBuild (a software toolkit
  for assembling custom supply-side workflows and real-time bidstream
  integrations), and OpenXControl (publisher yield management and demand
  routing). OpenX exposes several developer-facing APIs documented at
  docs.openx.com — an OpenRTB API for DSP bidding integrations, a Platform
  API for account, inventory, demand, targeting, and deal management, a
  Reporting API for analytics and performance metrics, an OpenXSelect
  GraphQL API for managing audiences/deals/inventory lists, and an
  OpenXBuild Real-Time Bidstream API — but the references are gated behind
  OAuth and OpenX does not publish a public OpenAPI specification or
  Postman collection. The company is a major contributor to the Prebid.org
  header-bidding ecosystem (Prebid.js and Prebid Server) and maintains a
  large GitHub organization with OAuth-based API client libraries in
  Python, PHP, Java, Perl, and Ruby for the legacy OX3 API. OpenX's
  business model is transaction-fee based — it takes a share of each ad
  impression cleared through its exchange — and access to the developer
  APIs requires an active OpenX account and BD/account-management
  onboarding rather than self-service signup.
